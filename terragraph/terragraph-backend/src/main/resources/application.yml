# =============================================================================
# TerraGraph Backend — Application Configuration
# Environment variables override defaults (e.g., via Docker Compose)
# =============================================================================

server:
  port: 8080
  servlet:
    context-path: /

# ─── Spring Core ──────────────────────────────────────────────────────────────
spring:
  application:
    name: terragraph-backend

  # ── MySQL 9.0 Datasource ──────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:terragraph_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${MYSQL_USER:terragraph_user}
    password: ${MYSQL_PASSWORD:terragraph_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: TerraGraph-HikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  # ── Flyway Database Migrations ─────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Jackson JSON Serialization ─────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # ── Spring AI (Groq — OpenAI-compatible endpoint) ──────────────────────────
  ai:
    openai:
      base-url: https://api.groq.com/openai
      api-key: ${GROQ_API_KEY:your-groq-api-key-here}
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.2
          max-tokens: 4096

# ─── Custom TerraGraph Properties ─────────────────────────────────────────────
terragraph:
  cors:
    allowed-origins: >
      http://localhost:5173,
      http://localhost:3000,
      http://terragraph-frontend
  rag:
    top-k: 5
    similarity-threshold: 0.75

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.dibyajit.terragraphbackend: DEBUG
    org.springframework.ai: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} — %msg%n"

# ─── Docker Profile Overrides ─────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://terragraph-mysql:3306/${MYSQL_DATABASE:terragraph_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
