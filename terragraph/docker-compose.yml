# =============================================================================
# TerraGraph — Multi-Container Orchestration
# Services: MySQL 9.0 | Spring Boot Backend | Vite + Nginx Frontend
# =============================================================================

services:

  # ─── MySQL 9.0 Database (with native VECTOR support) ────────────────────────
  terragraph-mysql:
    image: mysql:9.0
    container_name: terragraph-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-terragraph_root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-terragraph_db}
      MYSQL_USER: ${MYSQL_USER:-terragraph_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-terragraph_pass}
    ports:
      - "${MYSQL_EXTERNAL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - terragraph-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── Spring Boot Backend (Java 21, Spring AI, Flyway) ───────────────────────
  terragraph-backend:
    build:
      context: ./terragraph-backend
      dockerfile: Dockerfile
    container_name: terragraph-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://terragraph-mysql:3306/${MYSQL_DATABASE:-terragraph_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-terragraph_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-terragraph_pass}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      terragraph-mysql:
        condition: service_healthy
    networks:
      - terragraph-net
    restart: unless-stopped

  # ─── Vite + Nginx Frontend (React 18, TypeScript) ───────────────────────────
  terragraph-frontend:
    build:
      context: ./terragraph-frontend
      dockerfile: Dockerfile
    container_name: terragraph-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - terragraph-backend
    networks:
      - terragraph-net
    restart: unless-stopped

# ─── Persistent Volumes ────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ─── Internal Network ──────────────────────────────────────────────────────────
networks:
  terragraph-net:
    driver: bridge
